spring:
  application:
    name: schemabroker
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: ${h2Console.enabled:false}
      path: /h2-console
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:schemabrokerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa

# Toggle for enabling H2 console for local/dev only. Defaults to false.
h2Console:
  enabled: false

lease:
  ttlSeconds: 600

database.init.schemas: ${DATABASE_INIT_SCHEMAS:classpath:schema.yaml}
