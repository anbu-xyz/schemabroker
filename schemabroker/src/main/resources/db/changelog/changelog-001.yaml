databaseChangeLog:
  - changeSet:
      id: 1
      author: schemabroker
      changes:
        - createTable:
            tableName: schema_pool
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: schema_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: login_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: jdbc_url
                  type: VARCHAR(4000)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true

  - changeSet:
      id: 2
      author: schemabroker
      changes:
        - createTable:
            tableName: schema_lease
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: schema_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: login_user
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: jdbc_url
                  type: VARCHAR(400)
                  constraints:
                    nullable: false
              - column:
                  name: lease_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: leased_at
                  type: TIMESTAMP
              - column:
                  name: expires_at
                  type: TIMESTAMP
              - column:
                  name: last_heartbeat_at
                  type: TIMESTAMP
              - column:
                  name: ip_address
                  type: VARCHAR(45)
                  constraints:
                    nullable: false
              - column:
                  name: hostname
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: owner
                  type: VARCHAR(100)
              - column:
                  name: metadata
                  type: CLOB

  - changeSet:
      id: 3
      author: schemabroker
      changes:
        - sql:
            dbms: h2
            sql: |-
              ALTER TABLE schema_pool ADD CONSTRAINT ux_pool UNIQUE (schema_name, jdbc_url);

  - changeSet:
      id: 4
      author: schemabroker
      changes:
        - addForeignKeyConstraint:
            baseTableName: schema_lease
            baseColumnNames: schema_name, jdbc_url
            referencedTableName: schema_pool
            referencedColumnNames: schema_name, jdbc_url
            constraintName: fk_schema_lease_pool

  - changeSet:
      id: 5
      author: schemabroker
      changes:
        - createIndex:
            tableName: schema_lease
            indexName: idx_schema_lease_expires_at
            columns:
              - column:
                  name: expires_at

  - changeSet:
      id: 6
      author: schemabroker
      changes:
        - sql:
            dbms: h2
            sql: |-
              ALTER TABLE schema_lease ADD schema_active VARCHAR(255) as (CASE WHEN status = 'ACTIVE' THEN schema_name ELSE null END);
              ALTER TABLE schema_lease ADD CONSTRAINT ux_schema_active UNIQUE (schema_active);

  - changeSet:
      id: 7
      author: schemabroker
      changes:
