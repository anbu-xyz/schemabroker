spring:
  datasource:
    url: jdbc:h2:mem:schemabroker-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true

lease:
  ttlSeconds: 600

---
spring:
  config:
    activate:
      on-profile: test

